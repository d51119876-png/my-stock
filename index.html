<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCK HUB - 專業研究</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ph-orange: #ff9900; --ph-black: #000000; --ph-gray: #1b1b1b; }
        body { background-color: var(--ph-black); color: #ffffff; font-family: Arial, Helvetica, sans-serif; }
        
        /* PH 經典標誌設計 */
        .ph-logo { color: #ffffff; font-weight: 900; font-size: 2.2rem; letter-spacing: -1.5px; }
        .ph-logo span { background-color: var(--ph-orange); color: #000000; padding: 2px 8px; border-radius: 6px; margin-left: 4px; }

        /* 搜索列與按鈕 */
        .search-container { background: var(--ph-gray); border: 1px solid #333; }
        .ph-input { background: #000; border: 1px solid #444; color: #fff; }
        .ph-input:focus { border-color: var(--ph-orange); outline: none; }
        .ph-btn { background-color: var(--ph-orange); color: #000; font-weight: 800; border-radius: 4px; transition: 0.3s; }
        .ph-btn:hover { background-color: #ffad33; transform: scale(1.02); }

        /* 卡片與筆記區 */
        .stock-card { background: var(--ph-gray); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .note-area { background: #0a0a0a; color: #f0f0f0; border: 1px solid #333; width: 100%; min-height: 250px; font-size: 1.1rem; border-radius: 8px; }
        .note-area:focus { border-color: var(--ph-orange); outline: none; }

        /* K線圖容器 */
        .chart-box { height: 600px; width: 100%; background: #000; }
        
        .save-toast { color: var(--ph-orange); font-size: 12px; font-weight: bold; opacity: 0; transition: 0.4s; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 pb-8 border-b border-zinc-900 gap-6">
            <div class="ph-logo">STOCK<span>HUB</span></div>
            <div class="flex gap-3 w-full md:w-auto">
                <input type="text" id="stock-id" placeholder="輸入台股代號 (例如: 2330)" class="ph-input px-6 py-3 w-full md:w-64 rounded-md">
                <button onclick="addStock()" class="ph-btn px-8 py-3 text-base">搜尋分析</button>
            </div>
        </header>

        <div id="display-area" class="space-y-10">
            <div id="welcome" class="text-center py-32 border-2 border-dashed border-zinc-800 rounded-2xl">
                <h2 class="text-zinc-500 text-2xl font-bold italic">準備好開始交易了嗎？搜尋代號開始記錄您的分析。</h2>
                <p class="text-orange-900 text-sm mt-4">注意：所有筆記將加密儲存在您的本地瀏覽器中。</p>
            </div>
        </div>
    </div>

    <script>
        // 支援 Enter 鍵搜尋
        document.getElementById('stock-id').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addStock();
        });

        function addStock() {
            const idInput = document.getElementById('stock-id');
            const id = idInput.value.trim();
            if (!id) return;

            // 移除初始歡迎畫面
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            // 防止重複新增
            if (document.getElementById(`card-${id}`)) {
                alert('該股票已在分析列表中');
                return;
            }

            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = 'stock-card shadow-2xl animate-fade-in';
            card.innerHTML = `
                <div class="flex justify-between items-center p-4 bg-zinc-900 border-b border-zinc-800">
                    <span class="text-xl font-bold italic" style="color: #ff9900;">${id} 市場分析報告</span>
                    <button onclick="document.getElementById('card-${id}').remove()" class="text-zinc-600 hover:text-white text-sm">關閉 X</button>
                </div>

                <div class="chart-box">
                    <iframe 
                        src="https://s.tradingview.com/widgetembed/?symbol=TWSE:${id}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Asia%2FTaipei&withdateranges=1&showpopupbutton=1&locale=zh_TW" 
                        width="100%" height="100%" frameborder="0" allowfullscreen>
                    </iframe>
                </div>

                <div class="p-6">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-xs font-black text-zinc-500 tracking-widest uppercase">My Strategy & Observations</label>
                        <span id="toast-${id}" class="save-toast text-orange-500">SAVED</span>
                    </div>
                    <textarea id="note-${id}" class="note-area p-5 focus:outline-none" oninput="saveData('${id}')" placeholder="在此輸入您的操作策略、買賣點觀察..."></textarea>
                </div>
            `;

            const area = document.getElementById('display-area');
            area.insertBefore(card, area.firstChild);

            // 讀取舊資料
            const history = localStorage.getItem('note_' + id);
            if (history) document.getElementById('note-' + id).value = history;

            idInput.value = '';
        }

        function saveData(id) {
            const content = document.getElementById('note-' + id).value;
            localStorage.setItem('note_' + id, content);
            
            // 閃爍存檔提示
            const toast = document.getElementById('toast-' + id);
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 800);
        }
    </script>
</body>
</html>
