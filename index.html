<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股市筆記本 - 凱基通用版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #eee; }
        .note-box { background: #111; border: 1px solid #333; min-height: 200px; }
        .stock-item { border: 1px solid #222; margin-bottom: 24px; border-radius: 12px; background: #0a0a0a; }
        /* 讓圖表容器有固定高度 */
        .chart-wrapper { height: 500px; width: 100%; background: #131722; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <header class="border-b border-zinc-800 pb-4 mb-8">
            <h1 class="text-2xl font-bold text-yellow-500">自選股筆記本</h1>
        </header>

        <div id="stock-list" class="space-y-6"></div>
    </div>

    <script>
        const myStocks = [
            { id: '2330', name: '台積電', symbol: '2330' },
            { id: '2317', name: '鴻海', symbol: '2317' },
            { id: '2454', name: '聯發科', symbol: '2454' },
            { id: '2603', name: '長榮', symbol: '2603' }
        ];

        const listContainer = document.getElementById('stock-list');

        myStocks.forEach(stock => {
            const html = `
                <div class="stock-item p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">${stock.id} ${stock.name}</h2>
                        <button onclick="toggleChart('${stock.id}')" class="bg-zinc-800 px-4 py-2 rounded text-yellow-500 text-sm">切換 K 線</button>
                    </div>

                    <div id="chart-${stock.id}" class="hidden chart-wrapper mb-4">
                        <iframe 
                            src="https://s.tradingview.com/widgetembed/?symbol=TWSE:${stock.id}&interval=D&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW" 
                            width="100%" height="100%" frameborder="0" allowfullscreen>
                        </iframe>
                    </div>

                    <textarea id="note-${stock.id}" oninput="saveNote('${stock.id}')" 
                        class="note-box w-full p-4 rounded text-sm focus:outline-none focus:border-yellow-600" 
                        placeholder="在此輸入筆記..."></textarea>
                </div>
            `;
            listContainer.innerHTML += html;
        });

        function toggleChart(id) {
            const el = document.getElementById('chart-' + id);
            el.classList.toggle('hidden');
        }

        function saveNote(id) {
            localStorage.setItem('note_' + id, document.getElementById('note-' + id).value);
        }

        window.onload = () => {
            myStocks.forEach(stock => {
                const saved = localStorage.getItem('note_' + stock.id);
                if(saved) document.getElementById('note-' + stock.id).value = saved;
            });
        }
    </script>
</body>
</html>
