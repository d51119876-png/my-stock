<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業股市研究室 - PH Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深黑色背景 */
        body { background-color: #000000; color: #FFFFFF; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        /* Pornhub 橙黃色文字 (#FFA500) */
        .ph-accent { color: #FFA500; }
        
        /* 筆記區域 (#262626背景) */
        .note-box { background: #262626; border: 1px solid #333333; min-height: 250px; resize: vertical; color: #f2f2f2; }
        
        /* 卡片 (#1A1A1A背景) */
        .stock-card { border: 1px solid #333333; border-radius: 8px; background: #1A1A1A; overflow: hidden; margin-bottom: 1.5rem; transition: box-shadow 0.3s; }
        .stock-card:hover { box-shadow: 0 4px 15px rgba(255, 165, 0, 0.2); }
        
        /* 輸入框 & 按鈕焦點 */
        input:focus { outline: none; border-color: #FFA500; box-shadow: 0 0 8px rgba(255, 165, 0, 0.4); }
        button:focus { outline: none; box-shadow: 0 0 8px rgba(255, 165, 0, 0.4); }
        
        /* 歡迎區域樣式 */
        #welcome-msg { border: 2px dashed #333333; }
        
        /* 純淨K線容器 (維持白色背景以顯示清楚圖表) */
        .chart-container { position: relative; width: 100%; height: 500px; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="sticky top-0 z-50 bg-[#000000]/95 backdrop-blur-sm pb-6 mb-8 border-b border-[#333333]">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-3xl font-black ph-accent tracking-tighter hover:opacity-90">STOCK<span class="text-white">NOTE</span></h1>
                <div class="flex w-full md:w-auto gap-2">
                    <input type="text" id="stock-input" placeholder="輸入代號 (如: 2330)" 
                        class="bg-[#1A1A1A] border border-[#333333] rounded px-4 py-2 w-full md:w-48 text-white text-sm">
                    <button onclick="searchStock()" class="bg-[#FFA500] hover:bg-[#FFB732] text-black font-extrabold px-6 py-2 rounded transition-colors text-sm whitespace-nowrap">
                        搜尋並分析
                    </button>
                </div>
            </div>
        </header>

        <div id="display-area">
            <div id="welcome-msg" class="text-center py-20 text-[#cccccc] rounded-md">
                <p class="text-xl font-medium">請在上方輸入股票代號開始研究</p>
                <p class="text-sm mt-1 ph-accent">您的每則分析都會自動儲存</p>
            </div>
        </div>
    </div>

    <script>
        // 監聽 Enter 鍵
        document.getElementById('stock-input').addEventListener('keypress', (e) => e.key === 'Enter' && searchStock());

        function searchStock() {
            const inputEl = document.getElementById('stock-input');
            const id = inputEl.value.trim();
            if (!id) return;

            // 移除歡迎訊息
            const welcomeMsg = document.getElementById('welcome-msg');
            if (welcomeMsg) welcomeMsg.remove();

            // === [修復關鍵] ===
            // 如果該卡片已經存在，我們選擇跳過，不再警示
            if (document.getElementById(`card-${id}`)) {
                inputEl.value = ""; // 清空輸入框
                return; // 直接返回，不執行下方代碼
            }
            // =================

            // 建立新的股票卡片
            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = 'stock-card shadow-lg';
            
            card.innerHTML = `
                <div class="flex justify-between items-center p-3.5 bg-[#1A1A1A] border-b border-[#333333]">
                    <span class="font-bold text-xl ph-accent tracking-tight">${id} 分析報告</span>
                    <button onclick="removeCard('${id}')" class="text-gray-600 hover:text-red-500 text-xs">移除 X</button>
                </div>

                <div class="chart-container">
                    <iframe src="https://tw.stock.yahoo.com/q/ta?s=${id}" scrolling="auto"></iframe>
                </div>

                <div class="p-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-bold text-[#aaaaaa] uppercase tracking-widest">📝 交易筆記 / 策略分析</label>
                        <span id="save-status-${id}" class="text-[10px] ph-accent font-bold opacity-0 transition-opacity">已自動儲存</span>
                    </div>
                    <textarea id="note-${id}" oninput="saveNote('${id}')" 
                        class="note-box w-full p-4 rounded focus:outline-none text-base leading-relaxed" 
                        placeholder="在此輸入您的專業分析或計畫..."></textarea>
                </div>
            `;

            // 將新搜尋的放在最上面
            const displayArea = document.getElementById('display-area');
            displayArea.insertBefore(card, displayArea.firstChild);
            
            // 載入舊筆記
            const saved = localStorage.getItem('note_' + id);
            if(saved) document.getElementById('note-' + id).value = saved;

            // 清空輸入框
            inputEl.value = "";
        }

        function saveNote(id) {
            localStorage.setItem('note_' + id, document.getElementById('note-' + id).value);
            
            // 顯示橙黃色存檔提示
            const status = document.getElementById(`save-status-${id}`);
            status.style.opacity = "1";
            setTimeout(() => { status.style.opacity = "0"; }, 800);
        }

        function removeCard(id) {
            document.getElementById(`card-${id}`).remove();
        }
    </script>
</body>
</html>
