<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股市筆記本 - 正式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #eee; font-family: "Microsoft JhengHei", sans-serif; }
        .up { color: #ff3b3b; }
        .down { color: #00ff00; }
        .note-box { background: #111; border: 1px solid #333; min-height: 200px; resize: vertical; }
        .stock-item { border: 1px solid #222; margin-bottom: 24px; border-radius: 12px; overflow: hidden; background: #0a0a0a; }
        iframe { border-radius: 8px; background-color: #131722; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center border-b border-zinc-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500">我的自選股</h1>
                <p class="text-xs text-gray-500 mt-1">點擊股票名稱或按鈕展開 K 線圖</p>
            </div>
            <div class="text-right text-xs text-zinc-600">
                Data by TradingView
            </div>
        </header>

        <div id="stock-list" class="space-y-6">
            </div>
    </div>

    <script>
        // 股票清單：如果還有看到 "Only on TradingView"，請嘗試切換 TWSE 或 OTC
        const myStocks = [
            { id: '2330', name: '台積電', symbol: '2330' },
            { id: '2317', name: '鴻海', symbol: '2317' },
            { id: '2454', name: '聯發科', symbol: '2454' },
            { id: '2603', name: '長榮', symbol: '2603' }
        ];

        const listContainer = document.getElementById('stock-list');

        myStocks.forEach(stock => {
            const html = `
                <div class="stock-item p-4 md:p-6 shadow-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <div class="cursor-pointer" onclick="toggleChart('${stock.id}')">
                            <h2 class="text-2xl font-black text-white hover:text-yellow-500 transition-colors">${stock.id} ${stock.name}</h2>
                            <div class="text-xs text-zinc-500 mt-1">點擊展開 / 收合圖表</div>
                        </div>
                        <button onclick="toggleChart('${stock.id}')" class="bg-yellow-600 text-black font-bold px-5 py-2 rounded-full text-sm hover:bg-yellow-400">K 線</button>
                    </div>

                    <div id="chart-${stock.id}" class="hidden w-full h-[500px] mb-6 border border-zinc-800 rounded-lg overflow-hidden">
                        <div class="tradingview-widget-container" style="height:100%;width:100%">
                          <iframe scrolling="no" allowtransparency="true" frameborder="0" 
                            src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_762ae&symbol=${stock.symbol}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Asia%2FTaipei&withdateranges=1&showpopupbutton=1&popupwidth=1000&popupheight=650" 
                            style="width: 100%; height: 100%;"></iframe>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-zinc-400 mb-2 underline decoration-yellow-800">交易心得 / 備註：</label>
                        <textarea id="note-${stock.id}" oninput="saveNote('${stock.id}')" 
                            class="note-box w-full p-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-600 transition-all" 
                            placeholder="在這裡寫下你的分析、進出場理由..."></textarea>
                    </div>
                </div>
            `;
            listContainer.innerHTML += html;
        });

        function toggleChart(id) {
            const el = document.getElementById('chart-' + id);
            el.classList.toggle('hidden');
        }

        function saveNote(id) {
            const val = document.getElementById('note-' + id).value;
            localStorage.setItem('note_' + id, val);
        }

        window.onload = () => {
            myStocks.forEach(stock => {
                const saved = localStorage.getItem('note_' + stock.id);
                if(saved) document.getElementById('note-' + stock.id).value = saved;
            });
        }
    </script>
</body>
</html>
