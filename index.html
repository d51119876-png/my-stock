<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Stock Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pornhub 核心配色：純黑背景 + 亮橘強調 */
        :root { --ph-orange: #ff9900; --ph-black: #000000; --ph-gray: #1b1b1b; }
        body { background-color: var(--ph-black); color: #ffffff; font-family: Arial, sans-serif; margin: 0; }
        
        .header-logo { color: var(--ph-orange); font-weight: 900; letter-spacing: -1px; }
        .header-logo span { background-color: var(--ph-orange); color: black; padding: 2px 6px; border-radius: 4px; margin-left: 2px; }

        /* 搜索框與按鈕 */
        .search-input { background: #121212; border: 1px solid #333; color: white; border-radius: 4px; }
        .search-input:focus { border-color: var(--ph-orange); outline: none; }
        .ph-btn { background-color: var(--ph-orange); color: black; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .ph-btn:hover { background-color: #ffad33; }

        /* 卡片設計 */
        .stock-card { background-color: var(--ph-gray); border-radius: 8px; border: 1px solid #333; overflow: hidden; margin-bottom: 25px; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        /* 筆記區 */
        .note-area { background-color: #121212; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 15px; width: 100%; min-height: 200px; resize: vertical; }
        .note-area:focus { border-color: var(--ph-orange); outline: none; }

        /* 狀態文字 */
        .save-hint { color: var(--ph-orange); font-size: 10px; font-weight: bold; opacity: 0; transition: 0.5s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 pb-6 border-b border-zinc-800 gap-4">
            <div class="header-logo text-3xl">STOCK<span>HUB</span></div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="stock-id" placeholder="輸入代號 (如: 2330)" class="search-input px-4 py-2 w-full md:w-48 text-sm">
                <button onclick="addStock()" class="ph-btn px-6 py-2 text-sm whitespace-nowrap">搜尋分析</button>
            </div>
        </header>

        <div id="main-container">
            <div id="empty-msg" class="text-center py-20 text-zinc-600">
                <p class="text-lg">目前沒有分析項目，請搜尋代號開始。</p>
            </div>
        </div>
    </div>

    <script>
        // 監聽鍵盤 Enter
        document.getElementById('stock-id').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addStock();
        });

        function addStock() {
            const id = document.getElementById('stock-id').value.trim();
            if (!id) return;

            // 移除提示文字
            const emptyMsg = document.getElementById('empty-msg');
            if (emptyMsg) emptyMsg.remove();

            // 如果已經有了，就不要重複加
            if (document.getElementById(`card-${id}`)) {
                alert('此股票已在清單中');
                return;
            }

            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = 'stock-card shadow-2xl';
            card.innerHTML = `
                <div class="card-header">
                    <span class="font-bold text-lg" style="color: #ff9900;">${id} 數據分析</span>
                    <button onclick="document.getElementById('card-${id}').remove()" class="text-zinc-500 hover:text-white">關閉 X</button>
                </div>
                
                <div style="height: 550px; width: 100%; background: #131722;">
                    <iframe 
                        src="https://s.tradingview.com/widgetembed/?symbol=TWSE:${id}&interval=D&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW" 
                        width="100%" height="100%" frameborder="0" allowfullscreen>
                    </iframe>
                </div>

                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest">個人策略備註</span>
                        <span id="hint-${id}" class="save-hint">已存檔</span>
                    </div>
                    <textarea id="note-${id}" class="note-area" oninput="saveData('${id}')" placeholder="寫下你的操作想法..."></textarea>
                </div>
            `;

            // 放在最上面
            const container = document.getElementById('main-container');
            container.insertBefore(card, container.firstChild);

            // 讀取存檔
            const saved = localStorage.getItem('note_' + id);
            if (saved) document.getElementById('note-' + id).value = saved;

            // 清空輸入
            document.getElementById('stock-id').value = '';
        }

        function saveData(id) {
            const val = document.getElementById('note-' + id).value;
            localStorage.setItem('note_' + id, val);
            
            // 閃爍存檔提示
            const hint = document.getElementById('hint-' + id);
            hint.style.opacity = 1;
            setTimeout(() => { hint.style.opacity = 0; }, 800);
        }
    </script>
</body>
</html>
