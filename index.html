<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOCK HUB - WantGoo Pure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ph-orange: #ff9900; --ph-black: #000000; --ph-gray: #1b1b1b; }
        body { background-color: var(--ph-black); color: #ffffff; font-family: "Arial Black", sans-serif; margin: 0; }
        
        .ph-logo { color: #ffffff; font-weight: 900; font-size: 2.2rem; letter-spacing: -2px; }
        .ph-logo span { background-color: var(--ph-orange); color: #000; padding: 0px 8px; border-radius: 6px; margin-left: 4px; }

        .ph-input { background: #000; border: 2px solid #333; color: #fff; border-radius: 4px; }
        .ph-input:focus { border-color: var(--ph-orange); outline: none; }
        .ph-btn { background-color: var(--ph-orange); color: #000; font-weight: 900; border-radius: 4px; }

        .stock-card { background: var(--ph-gray); border: 1px solid #333; border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        .card-header { background: #222; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ph-orange); }
        
        /* 玩股網 K 線專用容器：透過負 margin 隱藏網頁頂部導覽 */
        .chart-container { position: relative; width: 100%; height: 550px; overflow: hidden; background: #000; }
        .chart-container iframe { 
            width: 100%; 
            height: 750px; /* 設高一點，把底部廣告推出去 */
            border: none;
            margin-top: -65px; /* 關鍵：把玩股網頂部的選單「推」出框框外 */
        }

        .note-area { 
            background-color: #000; 
            color: var(--ph-orange); 
            border: 1px solid #333; 
            width: 100%; 
            min-height: 100px; /* 緊湊筆記區 */
            border-radius: 6px; 
            padding: 12px; 
            font-family: "Consolas", monospace;
            font-size: 1rem;
            line-height: 1.4;
        }
        .note-area:focus { border-color: var(--ph-orange); outline: none; }

        .save-label { color: var(--ph-orange); font-size: 0.65rem; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="ph-logo">STOCK<span>HUB</span></div>
            <div class="flex gap-3 w-full md:w-auto">
                <input type="text" id="stock-id" placeholder="SYMBOL..." class="ph-input px-4 py-2 w-full md:w-48 text-sm">
                <button onclick="addStock()" class="ph-btn px-6 py-2 text-sm tracking-widest">Search</button>
            </div>
        </header>

        <div id="display-area">
            <div id="welcome" class="text-center py-20 border-2 border-zinc-900 rounded-2xl text-zinc-800">
                <p class="font-black italic">CHOOSE YOUR SYMBOL TO START ANALYZING</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('stock-id').addEventListener('keypress', (e) => e.key === 'Enter' && addStock());

        function addStock() {
            const idInput = document.getElementById('stock-id');
            const id = idInput.value.trim();
            if (!id) return;
            if (document.getElementById('welcome')) document.getElementById('welcome').remove();
            if (document.getElementById(`card-${id}`)) return;

            const card = document.createElement('div');
            card.id = `card-${id}`;
            card.className = 'stock-card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="text-lg font-black">${id} <span style="color: var(--ph-orange);">K-LINE</span></span>
                    <button onclick="document.getElementById('card-${id}').remove()" class="text-zinc-600 hover:text-white font-bold text-xs">CLOSE X</button>
                </div>
                
                <div class="chart-container">
                    <iframe src="https://www.wantgoo.com/stock/${id}/technical-chart" scrolling="no"></iframe>
                </div>

                <div class="p-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="save-label">Quick Note</label>
                        <span id="toast-${id}" class="save-label opacity-0" style="color: #000; background: var(--ph-orange); padding: 1px 4px; border-radius: 2px;">SAVED</span>
                    </div>
                    <textarea id="note-${id}" class="note-area" oninput="saveData('${id}')" placeholder="Notes..."></textarea>
                </div>
            `;
            const area = document.getElementById('display-area');
            area.insertBefore(card, area.firstChild);
            const history = localStorage.getItem('note_' + id);
            if (history) document.getElementById('note-' + id).value = history;
            idInput.value = '';
        }

        function saveData(id) {
            localStorage.setItem('note_' + id, document.getElementById('note-' + id).value);
            const toast = document.getElementById('toast-' + id);
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 800);
        }
    </script>
</body>
</html>
